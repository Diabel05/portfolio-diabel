<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contact - Amsatou Diabel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/fav1.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>

<nav class="navbar">
    <h2 class="logo">Amsatou Diabel</h2>
    <div class="menu-toggle" id="menu-toggle">
        <i class="fas fa-bars"></i>
    </div>
    <ul>
        <li><a href="index.html">Présentation</a></li>
        <li><a href="competences.html">Compétences</a></li>
        <li><a href="projets.html">Projets</a></li>
        <li><a href="experiences.html">Expériences</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
</nav>

<section class="container fade-in">
    <h1>Me Contacter</h1>

    <div class="forms-wrapper">
        <div class="card form-card">
            <h3><i class="fas fa-envelope"></i> Message direct</h3>
            <form id="contact-form">
                <input type="text" placeholder="Votre Nom" required>
                <input type="email" placeholder="Votre Email" required>
                <textarea placeholder="Votre Message" rows="4" required></textarea>
                <button type="submit">Envoyer</button>
            </form>
        </div>

        <div class="card form-card">
            <h3><i class="fas fa-file-signature"></i> Demande de projet</h3>
            <form id="demande-form">
                <input type="text" placeholder="Type de projet (Web, Réseau...)" required>
                <input type="text" placeholder="Budget estimé">
                <textarea placeholder="Détails du projet" rows="4"></textarea>
                <button type="submit">Soumettre</button>
            </form>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 Amsatou Diabel. Tous droits réservés.</p>
</footer>

</body>
</html>
